<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Quiz Platform</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #f4f6f9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; color: #2c3e50; position: relative; }
    #quiz-container, #loading { background: #ffffff; padding: 50px; border-radius: 16px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08); width: 90%; max-width: 650px; box-sizing: border-box; }
    #loading { text-align: center; font-size: 22px; color: #7f8c8d; font-style: italic; }
    
    /* DISEÑO DE LA INFO DE LA SECCIÓN Y PUNTOS EN LÍNEA */
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; }
    .section-title { color: #6200ee; font-size: 16px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; margin: 0; }
    
    /* INSIGNIA DE PUNTOS VISIBLE POR PREGUNTA */
    .quiz-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 90%;
      max-width: 650px; /* El contenedor padre ahora limita el ancho estricto */
      gap: 15px;
      box-sizing: border-box;
    }

    .points-badge {
      background: #38a169;
      color: white;
      padding: 14px 14px; /* Padding lateral a 0 para asegurar alineación perfecta al borde */
      border-radius: 30px;
      font-weight: bold;
      font-size: 18px;
      box-shadow: 0 4px 15px rgba(56, 161, 105, 0.25);
      white-space: nowrap;
      display: none;
      animation: fadeIn 0.4s ease forwards;
      
      /* AJUSTE FIJO GEOMÉTRICO CONTRA EL DESBORDE */
      width: fit-content; 
      box-sizing: border-box;
      text-align: center;
    }

    
    .step { display: none; }
    .step.active { display: block; animation: fadeIn 0.4s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .step p strong { font-size: 28px; line-height: 1.4; display: block; margin-bottom: 30px; }
    input[type="text"] { width: 100%; padding: 16px 20px; font-size: 20px; margin-top: 10px; box-sizing: border-box; border: 2px solid #e2e8f0; border-radius: 8px; outline: none; }
    input[type="text"]:focus { border-color: #6200ee; }
    .choice-container { margin-top: 20px; display: flex; flex-direction: column; gap: 14px; }
    .choice-option { display: flex; align-items: center; padding: 18px 22px; border: 2px solid #e2e8f0; border-radius: 10px; cursor: pointer; font-size: 20px; transition: all 0.2s ease; background-color: #fff; }
    .color-red { background-color: #fff5f5; border-color: #feb2b2; }
    .color-green { background-color: #f0fff4; border-color: #9ae6b4; }
    .color-blue { background-color: #ebf8ff; border-color: #90cdf4; }
    .color-yellow { background-color: #fefcbf; border-color: #faf089; }
    .color-red:has(input:checked) { border-color: #e53e3e; border-width: 3px; padding: 17px 21px; }
    .color-green:has(input:checked) { border-color: #38a169; border-width: 3px; padding: 17px 21px; }
    .color-blue:has(input:checked) { border-color: #3182ce; border-width: 3px; padding: 17px 21px; }
    .color-yellow:has(input:checked) { border-color: #d69e2e; border-width: 3px; padding: 17px 21px; }
    .choice-option input { margin-right: 16px; transform: scale(1.5); cursor: pointer; }
    button { width: 100%; margin-top: 35px; padding: 18px 24px; font-size: 20px; font-weight: 600; cursor: pointer; background: #6200ee; color: white; border: none; border-radius: 8px; box-shadow: 0 4px 12px rgba(98, 0, 238, 0.2); }
    button:disabled { background: #a0aec0; cursor: not-allowed; box-shadow: none; }
    .quiz-success-title { font-size: 32px; font-weight: bold; margin-bottom: 15px; text-align: center; }
    .quiz-success-p { font-size: 22px; color: #7f8c8d; text-align: center; }
  </style>
</head>
<body>

 <div class="quiz-wrapper">
	<div id="badge" class="points-badge" style="display: block;">Points: <span id="points-value">0</span></div>
  <div id="loading">Loading quiz template...</div>
  <div id="quiz-container" style="display:none;"></div>

</div>

  <script>
    // URL EXACTA CONFIRMADA
    const API_URL = 'https://script.google.com/macros/s/AKfycbxNFJi0U7h0YS1N_idHUzokdtFCgJz0w7c58YIPJNGsYdFCfQcdjhkrdiTHy0gAJYwOcA/exec';
let questions = [];
  let studentUid = ''; 
  let questionStartTime = null;
  let currentQuestionIndex = 0;
  let pollingIntervalId = null; // Controla el bucle intermitente de 5s en background
  const colorClasses = ['color-red', 'color-green', 'color-blue', 'color-yellow'];

  function generateCleanID() {
    return 'user_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
  }

  // RECEPTOR CENTRALIZADO: Procesa los puntos y el ranking devueltos por Google
  // RECEPTOR CENTRALIZED: Formatea los puntos a un máximo de 2 decimales y actualiza las vistas
  function handleLeaderboardData(payload) {
    const badgeElement = document.getElementById('badge');
    
    // 1. Estructuramos el string de la puntuación basado en la respuesta del servidor
    let pointsText = "";
    if (payload.points === "No points yet") {
      pointsText = "Points: No points yet";
    } else {
      // AJUSTE DE FORMATO COMPILADO: Forzamos un máximo de 2 decimales limpios sin ceros a la derecha innecesarios
      const formattedPoints = parseFloat(Number(payload.points).toFixed(2));
      
      const positionSuffix = payload.position !== undefined && payload.position !== "" ? ` (#${payload.position} position)` : "";
      pointsText = `Points: <span id="points-value">${formattedPoints}</span>${positionSuffix}`;
    }
    
    // Aseguramos que la medalla sea siempre visible (tanto en el quiz como en la pantalla final)
    badgeElement.innerHTML = pointsText;
    badgeElement.style.background = (payload.points === "No points yet") ? "#e53e3e" : "#38a169";
    badgeElement.style.display = 'block';

    // 2. Si el contenedor estaba oculto por la carga intermedia, lo volvemos a levantar con la nueva pregunta
    if (document.getElementById('quiz-container').style.display === 'none') {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('quiz-container').style.display = 'block';
      
      const targetStep = document.getElementById('step-' + currentQuestionIndex);
      if (targetStep) {
        targetStep.classList.add('active');
      }
      questionStartTime = Date.now(); 
    }
  }


  function fetchPointsFromLeaderboard() {
    const oldScript = document.getElementById('jsonp-runner');
    if (oldScript) oldScript.remove();

    const script = document.createElement('script');
    script.id = 'jsonp-runner';
    script.src = `${API_URL}?user=${studentUid}&callback=handleLeaderboardData&t=${Date.now()}`;
    document.body.appendChild(script);
  }

  // BUCLE EN SEGUNDO PLANO (POLLING): Acelerado a 5 segundos de forma perpetua
  function startPointsPolling() {
    if (pollingIntervalId) clearInterval(pollingIntervalId);
    
    pollingIntervalId = setInterval(() => {
      // Solo lanzamos la consulta silenciosa si el navegador no está en la pantalla intermedia de carga "Computing score..."
      if (document.getElementById('loading').style.display === 'none') {
        fetchPointsFromLeaderboard();
      }
    }, 5000); // REQUERIMIENTO: 5000 milisegundos
  }

  window.onload = function() {
    studentUid = generateCleanID();
    
    fetch('questions.json')
      .then(res => res.json())
      .then(data => {
        questions = data;
        renderQuizStructure(); 
        
        // Forzamos el encendido visual inicial de la primera pregunta en local
        document.getElementById('loading').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        document.getElementById('step-0').classList.add('active');
        questionStartTime = Date.now();
        
        // Sincronización inicial y activación del bucle intermitente de 5s
        fetchPointsFromLeaderboard();
        startPointsPolling(); 
      })
      .catch(err => {
        document.getElementById('loading').innerText = "Error loading local questions.json file.";
        console.error(err);
      });
  };

  function renderQuizStructure() {
    const container = document.getElementById('quiz-container');
    container.innerHTML = ""; 

    questions.forEach((q, index) => {
      const stepDiv = document.createElement('div');
      stepDiv.id = 'step-' + index;
      stepDiv.className = 'step';

      let inputHtml = '';
      if (q.type === 'checkbox') {
        inputHtml = `<div class="choice-container">`;
        q.choices.forEach((choice, cIndex) => {
          inputHtml += `<label class="choice-option ${colorClasses[cIndex % colorClasses.length]}"><input type="checkbox" name="q-${index}" value="${choice}"><span>${choice}</span></label>`;
        });
        inputHtml += `</div>`;
      } else if (q.type === 'radio') {
        inputHtml = `<div class="choice-container">`;
        q.choices.forEach((choice, cIndex) => {
          inputHtml += `<label class="choice-option ${colorClasses[cIndex % colorClasses.length]}"><input type="radio" name="q-${index}" value="${choice}"><span>${choice}</span></label>`;
        });
        inputHtml += `</div>`;
      } else {
        inputHtml = `<input type="text" id="input-${index}" placeholder="Type your answer here...">`;
      }

      // REQUERIMIENTO: El botón de la última sección ahora muestra textualmente "End Quiz"
      stepDiv.innerHTML = `
        <div class="section-header"><div class="section-title">${q.sectionName}</div></div>
        <p><strong>${q.title}</strong></p>
        ${inputHtml}
        <br>
        <button id="btn-${index}" onclick="submitStep(${index})">
          ${index === questions.length - 1 ? 'End Quiz' : 'Next Question →'}
        </button>
      `;
      container.appendChild(stepDiv);
    });
  }

  function submitStep(index) {
    const q = questions[index];
    const btn = document.getElementById('btn-' + index);
    let value = '';

    if (q.type === 'checkbox') {
      const checkedBoxes = document.querySelectorAll(`input[name="q-${index}"]:checked`);
      value = Array.from(checkedBoxes).map(cb => cb.value);
    } else if (q.type === 'radio') {
      const selected = document.querySelector(`input[name="q-${index}"]:checked`);
      value = selected ? selected.value : '';
    } else {
      const textInput = document.getElementById('input-' + index);
      value = textInput ? textInput.value : '';
    }

    let isCorrect = "-"; 
    if (q.correctAnswer !== "" && q.correctAnswer !== undefined && q.correctAnswer !== null) {
      if (q.type === 'checkbox') {
        const studentAnswers = Array.isArray(value) ? value : (value ? [value] : []);
        const correctAnswers = Array.isArray(q.correctAnswer) ? q.correctAnswer : [q.correctAnswer];
        const studentSorted = studentAnswers.map(String).sort().join(';');
        const correctSorted = correctAnswers.map(String).sort().join(';');
        isCorrect = (studentSorted === correctSorted) ? "1" : "0";
      } else {
        const studentStr = value !== undefined && value !== null ? String(value).trim() : "";
        const correctStr = String(q.correctAnswer).trim();
        isCorrect = (studentStr === correctStr) ? "1" : "0";
      }
    } else {
      isCorrect = "-";
    }

    const timeTaken = Date.now() - questionStartTime;
    btn.innerText = "Loading...";
    btn.disabled = true;

    // Desactivamos la sección de la pregunta actual en la interfaz
    document.getElementById('step-' + index).classList.remove('active');

    if (index < questions.length - 1) {
      // TRANSICIÓN INTERMEDIA: Ocultamos el recuadro blanco de la pregunta
      document.getElementById('quiz-container').style.display = 'none';
      
      // REQUERIMIENTO: Cambiamos el texto del Badge superior a "Computing score..." con fondo de espera gris neutro
      const badgeElement = document.getElementById('badge');
      badgeElement.innerHTML = "Computing score...";
      badgeElement.style.background = "#7f8c8d"; // Gris neutro
      badgeElement.style.display = 'block';

      const loadingElement = document.getElementById('loading');
      loadingElement.innerText = "Loading next question...";
      loadingElement.style.display = 'block';
      
      currentQuestionIndex = index + 1; 
    }

    // Petición POST de guardado secuencial rápido hacia la pestaña Raw
    fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' }, 
      body: JSON.stringify({
        studentUid: studentUid,
        qIndex: index,
        value: value,
        timeTaken: timeTaken,
        isCorrect: isCorrect 
      })
    })
    .then(res => res.json())
    .then(() => {
      if (index < questions.length - 1) {
        // Ejecuta la lectura secuencial. Al regresar, handleLeaderboardData() restaurará el badge a verde/rojo
        fetchPointsFromLeaderboard(); 
      } else {
        // REQUERIMIENTO PANTALLA FINAL: El recuadro blanco queda limpio y la medalla superior verde permanece fija
        document.getElementById('quiz-container').style.display = 'block';
        document.getElementById('quiz-container').innerHTML = `
          <div class='quiz-success-title'>Thanks!</div>
          <div class='quiz-success-p'>We hope you enjoyed the quiz for this lecture.</div>
        `;
        
        // Ejecutamos una llamada de lectura inmediata al terminar para forzar la actualización del badge verde final
        fetchPointsFromLeaderboard(); 
      }
    })
    .catch(err => {
      btn.innerText = index === questions.length - 1 ? 'End Quiz' : 'Next Question →';
      btn.disabled = false;
      alert("Network connection error");
    });
  }


</script>
</body>
</html>
